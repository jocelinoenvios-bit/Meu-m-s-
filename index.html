<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#12332B">
<title>Minhas Contas</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3EF;
    --card:#FFFFFF;
    --ink:#1C2723;
    --ink-soft:#5B6B62;
    --teal:#12332B;
    --teal-light:#1C6758;
    --coral:#C44536;
    --border:#DCE5DE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:84px;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    background:var(--teal);
    color:#fff;
    padding:22px 20px 26px;
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:-0.01em;
  }
  header p{
    font-size:13px;
    color:#B9CFC4;
    margin-top:2px;
  }
  main{ padding:16px; max-width:480px; margin:0 auto; }
  .card{
    background:var(--card);
    border-radius:14px;
    padding:18px;
    margin-bottom:14px;
    border:1px solid var(--border);
  }
  .saldo-label{
    font-size:13px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .saldo-valor{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:34px;
    margin-top:4px;
  }
  .saldo-valor.positivo{ color:var(--teal-light); }
  .saldo-valor.negativo{ color:var(--coral); }
  .resumo-row{
    display:flex;
    gap:12px;
    margin-top:14px;
  }
  .resumo-item{ flex:1; }
  .resumo-item .lbl{ font-size:12px; color:var(--ink-soft); }
  .resumo-item .val{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:16px;
  }
  .section-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
    margin:18px 0 10px;
  }
  .item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .item:last-child{ border-bottom:none; }
  .item-desc{ font-weight:500; font-size:14px; }
  .item-cat{ font-size:12px; color:var(--ink-soft); }
  .item-valor{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:14px;
  }
  .badge{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    margin-left:6px;
    font-weight:600;
  }
  .badge.pendente{ background:#FBEAE7; color:var(--coral); }
  .badge.pago{ background:#E4F0EA; color:var(--teal-light); }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:30px 10px;
  }
  form{ display:flex; flex-direction:column; gap:12px; }
  label{ font-size:13px; color:var(--ink-soft); font-weight:500; }
  input, select{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    font-size:15px;
    font-family:'Inter', sans-serif;
    background:#FAFBFA;
  }
  .toggle-tipo{ display:flex; gap:8px; }
  .toggle-tipo button{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#FAFBFA;
    font-weight:600;
    font-size:14px;
    color:var(--ink-soft);
  }
  .toggle-tipo button.ativo-entrada{ background:var(--teal-light); color:#fff; border-color:var(--teal-light); }
  .toggle-tipo button.ativo-saida{ background:var(--coral); color:#fff; border-color:var(--coral); }
  .btn-salvar{
    background:var(--teal);
    color:#fff;
    border:none;
    padding:14px;
    border-radius:10px;
    font-weight:600;
    font-size:15px;
    margin-top:4px;
  }
  nav{
    position:fixed;
    bottom:0; left:0; right:0;
    background:#fff;
    border-top:1px solid var(--border);
    display:flex;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  nav button{
    flex:1;
    background:none;
    border:none;
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding:6px 0;
    font-family:'Inter', sans-serif;
  }
  nav button .ic{ font-size:18px; }
  nav button.ativo{ color:var(--teal); font-weight:600; }
  .hidden{ display:none; }
  .item-acoes{ display:flex; gap:10px; margin-left:10px; }
  .item-acoes button{
    background:none;
    border:none;
    font-size:15px;
    padding:4px;
    color:var(--ink-soft);
  }
  .item-linha{ display:flex; justify-content:space-between; align-items:center; }
  .cat-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--border);
  }
  .cat-row:last-child{ border-bottom:none; }
  .cat-nome{ font-size:14px; font-weight:500; }
  .cat-tipo-tag{ font-size:11px; color:var(--ink-soft); }
  .cat-acoes button{
    background:none; border:none; font-size:14px; padding:4px 6px; color:var(--ink-soft);
  }
  .form-cat{ display:flex; gap:8px; margin-top:12px; }
  .form-cat input{ flex:2; }
  .form-cat select{ flex:1; }
  .form-cat button{
    background:var(--teal-light); color:#fff; border:none; border-radius:10px; padding:0 14px; font-weight:600;
  }
  .btn-perigo{
    background:#FBEAE7;
    color:var(--coral);
    border:1px solid #F3C9C2;
    padding:12px;
    border-radius:10px;
    font-weight:600;
    font-size:14px;
    width:100%;
    margin-top:8px;
  }
  .btn-cancelar{
    background:none;
    border:1px solid var(--border);
    color:var(--ink-soft);
    padding:12px;
    border-radius:10px;
    font-weight:600;
    font-size:14px;
  }
</style>
</head>
<body>

<header>
  <h1>Minhas Contas</h1>
  <p id="header-sub">Gerencie o que você ganha e gasta</p>
</header>

<main>

  <!-- TELA 1: DASHBOARD -->
  <section id="tela-dashboard">
    <div class="card">
      <div class="saldo-label">Saldo do mês</div>
      <div class="saldo-valor" id="saldo-valor">R$ 0,00</div>
      <div class="resumo-row">
        <div class="resumo-item">
          <div class="lbl">Entradas</div>
          <div class="val" id="total-entradas" style="color:var(--teal-light)">R$ 0,00</div>
        </div>
        <div class="resumo-item">
          <div class="lbl">Saídas</div>
          <div class="val" id="total-saidas" style="color:var(--coral)">R$ 0,00</div>
        </div>
      </div>
    </div>

    <div class="section-title">Pendências mais próximas</div>
    <div class="card" id="lista-pendencias-dashboard">
      <div class="empty">Nenhuma conta pendente 🎉</div>
    </div>

    <div class="section-title">Últimos lançamentos</div>
    <div class="card" id="lista-recentes">
      <div class="empty">Nenhum lançamento ainda</div>
    </div>
  </section>

  <!-- TELA 2: NOVA TRANSAÇÃO -->
  <section id="tela-nova" class="hidden">
    <div class="card">
      <form id="form-transacao">
        <div class="toggle-tipo">
          <button type="button" id="btn-tipo-entrada">Entrada</button>
          <button type="button" id="btn-tipo-saida">Saída</button>
        </div>

        <div>
          <label>Descrição</label>
          <input type="text" id="f-descricao" placeholder="Ex: Salário, Conta de luz" required>
        </div>

        <div>
          <label>Valor (R$)</label>
          <input type="number" id="f-valor" step="0.01" placeholder="0,00" required>
        </div>

        <div>
          <label>Categoria</label>
          <select id="f-categoria"></select>
        </div>

        <div>
          <label>Data</label>
          <input type="date" id="f-data" required>
        </div>

        <div id="wrap-status">
          <label>Status</label>
          <select id="f-status">
            <option value="pago">Pago / Recebido</option>
            <option value="pendente">Pendente</option>
          </select>
        </div>

        <button type="submit" class="btn-salvar" id="btn-salvar-transacao">Salvar lançamento</button>
        <button type="button" class="btn-cancelar hidden" id="btn-cancelar-edicao">Cancelar edição</button>
      </form>
    </div>
  </section>

  <!-- TELA 3: CONTAS A PAGAR -->
  <section id="tela-contas" class="hidden">
    <div class="section-title">Pendentes</div>
    <div class="card" id="lista-pendentes-full">
      <div class="empty">Nenhuma conta pendente</div>
    </div>
  </section>

  <!-- TELA 4: HISTÓRICO -->
  <section id="tela-historico" class="hidden">
    <div class="section-title">Todos os lançamentos</div>
    <div class="card" id="lista-historico">
      <div class="empty">Nenhum lançamento ainda</div>
    </div>
  </section>

  <!-- TELA 5: CONFIGURAÇÕES -->
  <section id="tela-config" class="hidden">
    <div class="section-title">Categorias</div>
    <div class="card">
      <div id="lista-categorias"></div>
      <div class="form-cat">
        <input type="text" id="cfg-cat-nome" placeholder="Nova categoria">
        <select id="cfg-cat-tipo">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>
        <button type="button" id="btn-add-categoria">+</button>
      </div>
    </div>

    <div class="section-title">Dados</div>
    <div class="card">
      <button type="button" class="btn-perigo" id="btn-apagar-tudo">Apagar todos os dados</button>
    </div>
  </section>

</main>

<nav>
  <button data-tela="dashboard" class="ativo"><span class="ic">🏠</span>Início</button>
  <button data-tela="nova"><span class="ic">➕</span>Novo</button>
  <button data-tela="contas"><span class="ic">⏰</span>Contas</button>
  <button data-tela="historico"><span class="ic">📋</span>Histórico</button>
  <button data-tela="config"><span class="ic">⚙️</span>Config</button>
</nav>

<script>
/* ---------- 1. "BANCO DE DADOS" (localStorage) ---------- */
// Guardamos tudo num único objeto salvo no localStorage do navegador.
// Isso funciona offline e não depende de servidor.
const DB_KEY = "financas_dados_v1";

function carregarDados(){
  const bruto = localStorage.getItem(DB_KEY);
  if(bruto) return JSON.parse(bruto);
  // Estado inicial: já vem com categorias padrão pra não começar vazio
  return {
    transacoes: [],
    categorias: [
      {id:"c1", nome:"Renda/Salário", tipo:"entrada"},
      {id:"c2", nome:"Vendas", tipo:"entrada"},
      {id:"c3", nome:"Outros ganhos", tipo:"entrada"},
      {id:"c4", nome:"Moradia", tipo:"saida"},
      {id:"c5", nome:"Alimentação", tipo:"saida"},
      {id:"c6", nome:"Transporte", tipo:"saida"},
      {id:"c7", nome:"Contas fixas (água/luz)", tipo:"saida"},
      {id:"c8", nome:"Outros gastos", tipo:"saida"}
    ]
  };
}

function salvarDados(){
  localStorage.setItem(DB_KEY, JSON.stringify(estado));
}

let estado = carregarDados();
let tipoSelecionado = "entrada";

/* ---------- 2. NAVEGAÇÃO ENTRE TELAS ---------- */
const telas = ["dashboard","nova","contas","historico","config"];
document.querySelectorAll("nav button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const alvo = btn.dataset.tela;
    telas.forEach(t=>{
      document.getElementById("tela-"+t).classList.toggle("hidden", t!==alvo);
    });
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("ativo"));
    btn.classList.add("ativo");
    // Se o usuário sair da tela "nova" sem salvar, cancela qualquer edição pendente
    if(alvo!=="nova") cancelarEdicao();
    if(alvo==="nova") prepararFormulario();
    renderizarTudo();
  });
});

/* ---------- 3. FORMULÁRIO DE NOVA TRANSAÇÃO (e edição) ---------- */
let editandoId = null; // null = criando nova; senão, guarda o id da transação em edição

function prepararFormulario(){
  document.getElementById("f-data").valueAsDate = new Date();
  selecionarTipo("entrada");
}

function cancelarEdicao(){
  editandoId = null;
  document.getElementById("btn-salvar-transacao").textContent = "Salvar lançamento";
  document.getElementById("btn-cancelar-edicao").classList.add("hidden");
  document.getElementById("form-transacao").reset();
}
document.getElementById("btn-cancelar-edicao").addEventListener("click", ()=>{
  cancelarEdicao();
  prepararFormulario();
});

// Preenche o formulário com os dados de uma transação existente e entra em modo edição
function editarTransacao(id){
  const t = estado.transacoes.find(t=>t.id===id);
  if(!t) return;
  editandoId = id;
  selecionarTipo(t.tipo);
  document.getElementById("f-descricao").value = t.descricao;
  document.getElementById("f-valor").value = t.valor;
  document.getElementById("f-categoria").value = t.categoria;
  document.getElementById("f-data").value = t.data;
  if(t.tipo==="saida") document.getElementById("f-status").value = t.status;
  document.getElementById("btn-salvar-transacao").textContent = "Salvar alterações";
  document.getElementById("btn-cancelar-edicao").classList.remove("hidden");
  document.querySelector('nav button[data-tela="nova"]').click();
}

function apagarTransacao(id){
  if(!confirm("Apagar este lançamento? Essa ação não pode ser desfeita.")) return;
  estado.transacoes = estado.transacoes.filter(t=>t.id!==id);
  salvarDados();
  if(editandoId===id) cancelarEdicao();
  renderizarTudo();
}

function selecionarTipo(tipo){
  tipoSelecionado = tipo;
  document.getElementById("btn-tipo-entrada").className = tipo==="entrada" ? "ativo-entrada" : "";
  document.getElementById("btn-tipo-saida").className = tipo==="saida" ? "ativo-saida" : "";
  document.getElementById("wrap-status").style.display = tipo==="saida" ? "block" : "none";
  // Preenche o select de categoria só com categorias do tipo escolhido
  const select = document.getElementById("f-categoria");
  select.innerHTML = "";
  estado.categorias.filter(c=>c.tipo===tipo).forEach(c=>{
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.nome;
    select.appendChild(opt);
  });
}
document.getElementById("btn-tipo-entrada").addEventListener("click", ()=>selecionarTipo("entrada"));
document.getElementById("btn-tipo-saida").addEventListener("click", ()=>selecionarTipo("saida"));

document.getElementById("form-transacao").addEventListener("submit", (e)=>{
  e.preventDefault(); // impede recarregar a página
  const dados = {
    tipo: tipoSelecionado,
    descricao: document.getElementById("f-descricao").value,
    valor: parseFloat(document.getElementById("f-valor").value),
    categoria: document.getElementById("f-categoria").value,
    data: document.getElementById("f-data").value,
    status: tipoSelecionado==="entrada" ? "pago" : document.getElementById("f-status").value
  };

  if(editandoId){
    // Modo edição: encontra a transação existente e substitui os campos, mantendo o id
    const idx = estado.transacoes.findIndex(t=>t.id===editandoId);
    if(idx > -1) estado.transacoes[idx] = { id: editandoId, ...dados };
  } else {
    // Modo criação: adiciona uma transação nova
    estado.transacoes.push({ id: "t"+Date.now(), ...dados });
  }

  salvarDados();
  cancelarEdicao();
  prepararFormulario();
  // Volta pro dashboard depois de salvar
  document.querySelector('nav button[data-tela="dashboard"]').click();
});

/* ---------- 4. CÁLCULOS ---------- */
function nomeCategoria(id){
  const c = estado.categorias.find(c=>c.id===id);
  return c ? c.nome : "";
}

function formatarMoeda(v){
  return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function transacoesDoMesAtual(){
  const hoje = new Date();
  return estado.transacoes.filter(t=>{
    const d = new Date(t.data+"T00:00:00");
    return d.getMonth()===hoje.getMonth() && d.getFullYear()===hoje.getFullYear();
  });
}

/* ---------- 5. RENDERIZAÇÃO DAS TELAS ---------- */
function renderizarDashboard(){
  const doMes = transacoesDoMesAtual();
  const entradas = doMes.filter(t=>t.tipo==="entrada").reduce((s,t)=>s+t.valor,0);
  // só contamos saída "paga" no saldo — pendente ainda não saiu do bolso
  const saidasPagas = doMes.filter(t=>t.tipo==="saida" && t.status==="pago").reduce((s,t)=>s+t.valor,0);
  const saldo = entradas - saidasPagas;

  const elSaldo = document.getElementById("saldo-valor");
  elSaldo.textContent = formatarMoeda(saldo);
  elSaldo.className = "saldo-valor " + (saldo>=0 ? "positivo" : "negativo");

  document.getElementById("total-entradas").textContent = formatarMoeda(entradas);
  document.getElementById("total-saidas").textContent = formatarMoeda(saidasPagas);

  // Pendências (próximas 3)
  const pendentes = estado.transacoes
    .filter(t=>t.status==="pendente")
    .sort((a,b)=> new Date(a.data) - new Date(b.data))
    .slice(0,3);
  const elPend = document.getElementById("lista-pendencias-dashboard");
  elPend.innerHTML = pendentes.length ? pendentes.map(itemHTML).join("") : '<div class="empty">Nenhuma conta pendente 🎉</div>';

  // Últimos 5 lançamentos
  const recentes = [...estado.transacoes].sort((a,b)=> new Date(b.data)-new Date(a.data)).slice(0,5);
  const elRec = document.getElementById("lista-recentes");
  elRec.innerHTML = recentes.length ? recentes.map(itemHTML).join("") : '<div class="empty">Nenhum lançamento ainda</div>';
}

function renderizarContas(){
  const pendentes = estado.transacoes
    .filter(t=>t.status==="pendente")
    .sort((a,b)=> new Date(a.data) - new Date(b.data));
  const el = document.getElementById("lista-pendentes-full");
  el.innerHTML = pendentes.length ? pendentes.map(itemHTML).join("") : '<div class="empty">Nenhuma conta pendente</div>';
}

function renderizarHistorico(){
  const todos = [...estado.transacoes].sort((a,b)=> new Date(b.data)-new Date(a.data));
  const el = document.getElementById("lista-historico");
  el.innerHTML = todos.length ? todos.map(itemHTML).join("") : '<div class="empty">Nenhum lançamento ainda</div>';
}

function itemHTML(t){
  const sinal = t.tipo==="entrada" ? "+" : "−";
  const cor = t.tipo==="entrada" ? "var(--teal-light)" : "var(--coral)";
  const badge = t.status==="pendente" ? '<span class="badge pendente">pendente</span>' : (t.tipo==="saida" ? '<span class="badge pago">pago</span>' : '');
  const dataFmt = new Date(t.data+"T00:00:00").toLocaleDateString('pt-BR');
  return `
    <div class="item">
      <div>
        <div class="item-desc">${t.descricao} ${badge}</div>
        <div class="item-cat">${nomeCategoria(t.categoria)} · ${dataFmt}</div>
      </div>
      <div class="item-linha">
        <div class="item-valor" style="color:${cor}">${sinal} ${formatarMoeda(t.valor)}</div>
        <div class="item-acoes">
          <button type="button" onclick="editarTransacao('${t.id}')" title="Editar">✏️</button>
          <button type="button" onclick="apagarTransacao('${t.id}')" title="Apagar">🗑️</button>
        </div>
      </div>
    </div>`;
}

function renderizarTudo(){
  renderizarDashboard();
  renderizarContas();
  renderizarHistorico();
  renderizarConfig();
}

/* ---------- 5b. CONFIGURAÇÕES: categorias e apagar dados ---------- */
function renderizarConfig(){
  const el = document.getElementById("lista-categorias");
  if(!estado.categorias.length){
    el.innerHTML = '<div class="empty">Nenhuma categoria cadastrada</div>';
    return;
  }
  el.innerHTML = estado.categorias.map(c => `
    <div class="cat-row">
      <div>
        <div class="cat-nome">${c.nome}</div>
        <div class="cat-tipo-tag">${c.tipo === "entrada" ? "Entrada" : "Saída"}</div>
      </div>
      <div class="cat-acoes">
        <button type="button" onclick="editarCategoria('${c.id}')" title="Editar">✏️</button>
        <button type="button" onclick="apagarCategoria('${c.id}')" title="Apagar">🗑️</button>
      </div>
    </div>`).join("");
}

document.getElementById("btn-add-categoria").addEventListener("click", ()=>{
  const nomeEl = document.getElementById("cfg-cat-nome");
  const nome = nomeEl.value.trim();
  const tipo = document.getElementById("cfg-cat-tipo").value;
  if(!nome) return;
  estado.categorias.push({ id: "c"+Date.now(), nome, tipo });
  salvarDados();
  nomeEl.value = "";
  renderizarConfig();
});

// Edita o nome de uma categoria (o tipo não muda, pra não bagunçar lançamentos já feitos)
function editarCategoria(id){
  const c = estado.categorias.find(c=>c.id===id);
  if(!c) return;
  const novoNome = prompt("Novo nome da categoria:", c.nome);
  if(novoNome === null || !novoNome.trim()) return;
  c.nome = novoNome.trim();
  salvarDados();
  renderizarConfig();
}

// Apaga uma categoria. Lançamentos que já usam ela continuam existindo,
// só deixam de aparecer na lista de opções do formulário.
function apagarCategoria(id){
  const emUso = estado.transacoes.some(t=>t.categoria===id);
  const aviso = emUso
    ? "Essa categoria já está sendo usada em lançamentos. Apagar mesmo assim?"
    : "Apagar esta categoria?";
  if(!confirm(aviso)) return;
  estado.categorias = estado.categorias.filter(c=>c.id!==id);
  salvarDados();
  renderizarConfig();
}

document.getElementById("btn-apagar-tudo").addEventListener("click", ()=>{
  if(!confirm("Isso vai apagar TODOS os lançamentos e categorias. Não tem como desfazer. Confirma?")) return;
  localStorage.removeItem(DB_KEY);
  estado = carregarDados();
  cancelarEdicao();
  renderizarTudo();
});

/* ---------- 6. PWA: registrar service worker ---------- */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ---------- INÍCIO ---------- */
prepararFormulario();
renderizarTudo();
</script>
